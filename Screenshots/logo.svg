<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1f3c"/>
      <stop offset="60%" stop-color="#0d1025"/>
      <stop offset="100%" stop-color="#050714"/>
    </radialGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip for rounded rect background -->
    <clipPath id="roundClip">
      <rect x="8" y="8" width="224" height="224" rx="48"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect x="8" y="8" width="224" height="224" rx="48" fill="url(#bg)"/>

  <!-- Circuit lines -->
  <g clip-path="url(#roundClip)" opacity="0.12" stroke="#00e5ff" stroke-width="1" fill="none">
    <!-- Horizontal lines -->
    <line x1="8" y1="60" x2="80" y2="60"/>
    <line x1="100" y1="60" x2="140" y2="60"/>
    <line x1="160" y1="60" x2="232" y2="60"/>
    <line x1="8" y1="120" x2="60" y2="120"/>
    <line x1="180" y1="120" x2="232" y2="120"/>
    <line x1="8" y1="180" x2="80" y2="180"/>
    <line x1="100" y1="180" x2="150" y2="180"/>
    <line x1="170" y1="180" x2="232" y2="180"/>
    <!-- Vertical lines -->
    <line x1="80" y1="8" x2="80" y2="60"/>
    <line x1="80" y1="100" x2="80" y2="140"/>
    <line x1="80" y1="180" x2="80" y2="232"/>
    <line x1="160" y1="8" x2="160" y2="60"/>
    <line x1="160" y1="100" x2="160" y2="140"/>
    <line x1="160" y1="180" x2="160" y2="232"/>
    <!-- Extra traces -->
    <line x1="120" y1="8" x2="120" y2="40"/>
    <line x1="120" y1="200" x2="120" y2="232"/>
    <line x1="40" y1="90" x2="40" y2="150"/>
    <line x1="200" y1="90" x2="200" y2="150"/>
    <!-- Diagonal traces -->
    <polyline points="80,60 100,80 100,100"/>
    <polyline points="160,60 140,80 140,100"/>
    <polyline points="80,180 100,160 100,140"/>
    <polyline points="160,180 140,160 140,140"/>
  </g>

  <!-- Circuit nodes (dots at intersections) -->
  <g clip-path="url(#roundClip)" opacity="0.2" fill="#00e5ff">
    <circle cx="80" cy="60" r="3"/>
    <circle cx="160" cy="60" r="3"/>
    <circle cx="80" cy="180" r="3"/>
    <circle cx="160" cy="180" r="3"/>
    <circle cx="120" cy="40" r="2.5"/>
    <circle cx="120" cy="200" r="2.5"/>
    <circle cx="40" cy="90" r="2"/>
    <circle cx="40" cy="150" r="2"/>
    <circle cx="200" cy="90" r="2"/>
    <circle cx="200" cy="150" r="2"/>
    <circle cx="100" cy="80" r="2"/>
    <circle cx="140" cy="80" r="2"/>
    <circle cx="100" cy="160" r="2"/>
    <circle cx="140" cy="160" r="2"/>
  </g>

  <!-- Main icon group - PicoClaw crab -->
  <g transform="translate(120,112)" filter="url(#neon)">
    <!-- Outer glow ring -->
    <ellipse cx="0" cy="2" rx="46" ry="40" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.4"/>

    <!-- Body -->
    <ellipse cx="0" cy="4" rx="34" ry="28" fill="url(#bg)" stroke="url(#claw)" stroke-width="2.5"/>

    <!-- Inner body gradient fill -->
    <ellipse cx="0" cy="4" rx="31" ry="25" fill="url(#claw)" opacity="0.08"/>

    <!-- Circuit pattern on body -->
    <g stroke="url(#claw)" stroke-width="0.8" opacity="0.25" fill="none">
      <line x1="-20" y1="4" x2="-8" y2="4"/>
      <line x1="8" y1="4" x2="20" y2="4"/>
      <line x1="0" y1="-8" x2="0" y2="-2"/>
      <line x1="0" y1="10" x2="0" y2="16"/>
      <line x1="-12" y1="-4" x2="-6" y2="-4"/>
      <line x1="6" y1="-4" x2="12" y2="-4"/>
      <line x1="-12" y1="12" x2="-6" y2="12"/>
      <line x1="6" y1="12" x2="12" y2="12"/>
    </g>

    <!-- Eyes -->
    <ellipse cx="-10" cy="-4" rx="6" ry="5.5" fill="#0a0e1a" stroke="url(#claw)" stroke-width="1.5"/>
    <ellipse cx="10" cy="-4" rx="6" ry="5.5" fill="#0a0e1a" stroke="url(#claw)" stroke-width="1.5"/>
    <!-- Eye glow -->
    <ellipse cx="-9" cy="-4" rx="3.5" ry="3" fill="#00e5ff" opacity="0.8"/>
    <ellipse cx="11" cy="-4" rx="3.5" ry="3" fill="#00e5ff" opacity="0.8"/>
    <!-- Eye highlight -->
    <circle cx="-10" cy="-6" r="1.2" fill="white" opacity="0.9"/>
    <circle cx="10" cy="-6" r="1.2" fill="white" opacity="0.9"/>

    <!-- Antenna -->
    <line x1="0" y1="-24" x2="0" y2="-44" stroke="url(#claw)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-48" r="5" fill="#ff6d00" filter="url(#softGlow)" opacity="0.9"/>
    <circle cx="0" cy="-48" r="2.5" fill="#ffab40" opacity="0.7"/>

    <!-- Left claws -->
    <g stroke="url(#claw)" stroke-width="2.8" fill="none" stroke-linecap="round">
      <path d="M-30,12 Q-46,-2 -40,-18"/>
      <path d="M-28,18 Q-50,6 -44,-12"/>
    </g>
    <!-- Right claws -->
    <g stroke="url(#claw)" stroke-width="2.8" fill="none" stroke-linecap="round">
      <path d="M30,12 Q46,-2 40,-18"/>
      <path d="M28,18 Q50,6 44,-12"/>
    </g>

    <!-- Small legs -->
    <g stroke="url(#claw)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6">
      <path d="M-20,24 L-28,38"/>
      <path d="M-10,28 L-14,42"/>
      <path d="M10,28 L14,42"/>
      <path d="M20,24 L28,38"/>
    </g>
  </g>

  <!-- "LuCI" text at bottom -->
  <text x="120" y="208" text-anchor="middle" font-family="'SF Pro Display','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="url(#claw)" opacity="0.7" letter-spacing="4">LUCI</text>
</svg>
